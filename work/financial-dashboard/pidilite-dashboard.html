<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Financial Health — Pidilite Industries</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#F6F2E9; --ink:#15130E; --ink-2:#3A362D; --mute:#6B6557;
    --rule:#DAD3C4; --rule-2:#C8C0AE; --red:#A6291E; --blue:#244B73; --green:#2E6A52;
    --blue-soft:#E3E9F1; --green-soft:#DDE8E0; --amber:#BE7C28;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--paper); color:var(--ink);
    font-family:'Hanken Grotesk',system-ui,sans-serif; line-height:1.5;
    background-image:repeating-linear-gradient(to bottom,transparent 0 33px,#C7D2E0 33px 34px);
    padding:clamp(20px,5vw,56px);
  }
  .wrap{max-width:1040px;margin:0 auto}
  .serif{font-family:'Instrument Serif',Georgia,serif;letter-spacing:-.02em;font-weight:400}
  .mono{font-family:'Space Mono',monospace}
  .eyebrow{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute)}

  header.hd{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:8px}
  .hd h1{font-family:'Instrument Serif',serif;font-size:clamp(2.4rem,6vw,4rem);line-height:.95;letter-spacing:-.02em;font-weight:400}
  .hd .sub{margin-top:6px}
  .badge{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;border-radius:999px;border:1.5px solid var(--green);color:var(--green);background:var(--green-soft);white-space:nowrap}

  .note{font-size:13px;color:var(--mute);margin:14px 0 28px}

  h2.sec{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);margin:36px 0 16px;display:flex;align-items:center;gap:12px}
  h2.sec::before{content:"";width:20px;height:3px;border-radius:2px;background:var(--blue)}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:780px){.kpis{grid-template-columns:repeat(2,1fr)}}
  .kpi{border:1px solid var(--rule-2);background:rgba(255,255,255,.35);border-radius:4px;padding:16px}
  .kpi .label{font-family:'Space Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mute)}
  .kpi .val{font-family:'Instrument Serif',serif;font-size:2rem;line-height:1.05;margin-top:6px}
  .kpi .delta{font-family:'Space Mono',monospace;font-size:12px;margin-top:4px}
  .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--mute)}

  .panels{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:780px){.panels{grid-template-columns:1fr}}
  .panel{border:1px solid var(--rule-2);background:rgba(255,255,255,.35);border-radius:4px;padding:18px}
  .panel h3{font-family:'Instrument Serif',serif;font-size:1.3rem;font-weight:400;margin-bottom:4px}
  .panel .cap{font-size:12px;color:var(--mute);margin-bottom:10px}
  .legend{display:flex;gap:16px;font-family:'Space Mono',monospace;font-size:11px;color:var(--mute);margin-top:8px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}

  table.score{width:100%;border-collapse:collapse;border-top:1px solid var(--rule)}
  .score td{padding:13px 8px;border-bottom:1px solid var(--rule);vertical-align:middle}
  .score .dim{font-weight:600}
  .score .detail{font-size:13px;color:var(--mute)}
  .rate{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .r-strong{color:var(--green);background:var(--green-soft);border:1px solid var(--green)}
  .r-good{color:var(--blue);background:var(--blue-soft);border:1px solid var(--blue)}
  .r-watch{color:var(--amber);background:#F4E9D2;border:1px solid var(--amber)}

  .verdict{border-left:3px solid var(--blue);background:rgba(255,255,255,.35);padding:18px 20px;border-radius:0 4px 4px 0;margin-top:18px}
  .verdict .serif{font-size:1.25rem}
  footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--rule);font-family:'Space Mono',monospace;font-size:11px;color:var(--mute);line-height:1.7}
  footer a{color:var(--blue)}
</style>
</head>
<body>
<div class="wrap">
  <header class="hd">
    <div>
      <div class="eyebrow">Financial-Health Dashboard</div>
      <h1 class="serif" id="coName">—</h1>
      <div class="sub mono" id="coMeta" style="font-size:13px;color:var(--mute)"></div>
    </div>
    <div class="badge" id="overall">—</div>
  </header>
  <p class="note" id="topNote"></p>

  <h2 class="sec">Headline metrics (FY26)</h2>
  <div class="kpis" id="kpis"></div>

  <h2 class="sec">Trends — five years</h2>
  <div class="panels">
    <div class="panel">
      <h3>Revenue &amp; Net Profit</h3>
      <div class="cap">₹ Crore, FY22–FY26</div>
      <div id="barChart"></div>
      <div class="legend"><span><i style="background:var(--blue)"></i>Revenue</span><span><i style="background:var(--red)"></i>Net profit</span></div>
    </div>
    <div class="panel">
      <h3>Margins</h3>
      <div class="cap">% of revenue, FY22–FY26</div>
      <div id="marginChart"></div>
      <div class="legend"><span><i style="background:var(--green)"></i>EBITDA margin</span><span><i style="background:var(--red)"></i>Net margin</span></div>
    </div>
  </div>

  <h2 class="sec">Health scorecard</h2>
  <table class="score"><tbody id="score"></tbody></table>

  <div class="verdict">
    <div class="eyebrow" style="margin-bottom:8px">The verdict</div>
    <p class="serif" id="verdict"></p>
  </div>

  <footer id="foot"></footer>
</div>

<script>
/* ============================================================
   Swap this DATA object to run the dashboard on ANY company.
   Pidilite figures: REPORTED (screener.in) where marked; ratios
   needing the full balance sheet are flagged — fill from the AR.
   ============================================================ */
const DATA = {
  company: "Pidilite Industries",
  meta: "NSE: PIDILITIND · consolidated · data as of 20 May 2026",
  years: ["FY22","FY23","FY24","FY25","FY26"],
  revenue: [9921, 11799, 12383, 13140, 14601],   // reported
  ebitda:  [1856, 1986, 2708, 3011, 3517],        // reported (operating profit)
  opm:     [19, 17, 22, 23, 24],                  // reported %
  pat:     [1207, 1289, 1747, 2096, 2471],        // reported
  latest: { roce: 31.0, roe: 23.9, pe: 60.2, price: 1455, mcap: 148107, bookValue: 106, borrowings: 417 },
  source: "screener.in/company/PIDILITIND"
};

const cr = n => "₹" + n.toLocaleString("en-IN") + " Cr";
const pct = n => n.toFixed(1) + "%";
const cagr = (a,b,yrs) => (Math.pow(b/a, 1/yrs) - 1) * 100;
const yoy = (prev,now) => (now/prev - 1) * 100;
const last = a => a[a.length-1];
const deltaTag = v => `<div class="delta ${v>0.5?'up':v<-0.5?'down':'flat'}">${v>0?'▲':v<0?'▼':'■'} ${Math.abs(v).toFixed(1)}% YoY</div>`;

const D = DATA, n = D.years.length;
const netMargin = D.pat.map((p,i)=> p/D.revenue[i]*100);
const equity = D.latest.bookValue * (D.latest.mcap / D.latest.price);   // ≈ shares × book value
const de = D.latest.borrowings / equity;
const revCAGR = cagr(D.revenue[0], last(D.revenue), n-1);
const patCAGR = cagr(D.pat[0], last(D.pat), n-1);

/* ---- header ---- */
coName.textContent = D.company;
coMeta.textContent = D.meta;
topNote.textContent = "REPORTED figures from " + D.source + ". Liquidity & efficiency ratios (current ratio, debtor/inventory days) need the full balance sheet — add them from the annual report. Educational, not investment advice.";

/* ---- KPI tiles ---- */
const kpis = [
  { label:"Revenue (FY26)", val: cr(last(D.revenue)), d: yoy(D.revenue[n-2], last(D.revenue)) },
  { label:"Net profit (FY26)", val: cr(last(D.pat)), d: yoy(D.pat[n-2], last(D.pat)) },
  { label:"EBITDA margin", val: pct(last(D.opm)), d: last(D.opm)-D.opm[n-2] },
  { label:"Net margin", val: pct(last(netMargin)), d: last(netMargin)-netMargin[n-2] },
  { label:"ROCE", val: pct(D.latest.roce), sub:"return on capital" },
  { label:"ROE", val: pct(D.latest.roe), sub:"return on equity" },
  { label:"Debt / Equity", val: de.toFixed(2), sub:"≈ net debt-free" },
  { label:"P/E", val: D.latest.pe.toFixed(0)+"×", sub:"valuation (see note)" },
];
document.getElementById("kpis").innerHTML = kpis.map(k=>`
  <div class="kpi"><div class="label">${k.label}</div><div class="val">${k.val}</div>
  ${k.d!==undefined ? deltaTag(k.d) : `<div class="delta flat">${k.sub||""}</div>`}</div>`).join("");

/* ---- bar chart: revenue & net profit ---- */
(function(){
  const W=480,H=240,pad={l:14,r:14,t:24,b:28};
  const cw=(W-pad.l-pad.r)/n, max=Math.max(...D.revenue)*1.1;
  const y = v => H-pad.b-(v/max)*(H-pad.t-pad.b);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" font-family="Space Mono,monospace">`;
  D.years.forEach((yr,i)=>{
    const gx=pad.l+i*cw, bw=cw*0.30;
    const r=D.revenue[i], p=D.pat[i];
    s+=`<rect x="${gx+cw/2-bw-2}" y="${y(r)}" width="${bw}" height="${H-pad.b-y(r)}" fill="#244B73" rx="1.5"/>`;
    s+=`<rect x="${gx+cw/2+2}" y="${y(p)}" width="${bw}" height="${H-pad.b-y(p)}" fill="#A6291E" rx="1.5"/>`;
    s+=`<text x="${gx+cw/2-bw/2-2}" y="${y(r)-5}" font-size="8.5" text-anchor="middle" fill="#6B6557">${(r/1000).toFixed(1)}k</text>`;
    s+=`<text x="${gx+cw/2}" y="${H-pad.b+15}" font-size="9" text-anchor="middle" fill="#6B6557">${yr}</text>`;
  });
  s+=`</svg>`;
  document.getElementById("barChart").innerHTML=s;
})();

/* ---- margin chart: EBITDA margin & net margin lines ---- */
(function(){
  const W=480,H=240,pad={l:24,r:14,t:20,b:28}, max=30;
  const x=i=>pad.l+i*((W-pad.l-pad.r)/(n-1));
  const y=v=>H-pad.b-(v/max)*(H-pad.t-pad.b);
  const line=(arr,col)=>{
    const pts=arr.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
    let g=`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.5"/>`;
    arr.forEach((v,i)=>{ g+=`<circle cx="${x(i)}" cy="${y(v)}" r="3.5" fill="${col}"/>`;
      g+=`<text x="${x(i)}" y="${y(v)-8}" font-size="8.5" text-anchor="middle" fill="${col}">${v.toFixed(0)}</text>`; });
    return g;
  };
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" font-family="Space Mono,monospace">`;
  [0,10,20,30].forEach(g=>{ s+=`<line x1="${pad.l}" y1="${y(g)}" x2="${W-pad.r}" y2="${y(g)}" stroke="#DAD3C4" stroke-width="1"/>`;
    s+=`<text x="${pad.l-6}" y="${y(g)+3}" font-size="8" text-anchor="end" fill="#6B6557">${g}</text>`; });
  s+=line(D.opm,"#2E6A52")+line(netMargin,"#A6291E");
  D.years.forEach((yr,i)=> s+=`<text x="${x(i)}" y="${H-pad.b+15}" font-size="9" text-anchor="middle" fill="#6B6557">${yr}</text>`);
  s+=`</svg>`;
  document.getElementById("marginChart").innerHTML=s;
})();

/* ---- scorecard ---- */
const score = [
  ["Profitability", `EBITDA margin ${pct(last(D.opm))}, net margin ${pct(last(netMargin))} — high and rising`, "strong"],
  ["Returns on capital", `ROCE ${pct(D.latest.roce)}, ROE ${pct(D.latest.roe)} — elite`, "strong"],
  ["Growth", `Revenue CAGR ${pct(revCAGR)}, PAT CAGR ${pct(patCAGR)} (5-yr)`, "good"],
  ["Balance-sheet strength", `Debt/Equity ${de.toFixed(2)} — effectively net debt-free`, "strong"],
  ["Liquidity & efficiency", "Current ratio, debtor &amp; inventory days — add from balance sheet", "watch"],
  ["Valuation", `P/E ${D.latest.pe.toFixed(0)}× — richly valued (see valuation note)`, "watch"],
];
const rcls={strong:"r-strong",good:"r-good",watch:"r-watch"}, rtxt={strong:"Strong",good:"Good",watch:"Watch"};
document.getElementById("score").innerHTML = score.map(([d,det,r])=>`
  <tr><td class="dim">${d}<div class="detail">${det}</div></td>
  <td style="text-align:right"><span class="rate ${rcls[r]}">${rtxt[r]}</span></td></tr>`).join("");

/* ---- verdict ---- */
document.getElementById("verdict").innerHTML =
  "Financially, Pidilite is about as healthy as a company gets — margins are high and still climbing (EBITDA 24%, net ~17%), returns are elite (ROCE 31%), growth is steady double-digit, and it carries almost no debt. The only amber light isn't the business at all — it's the <strong>price</strong>: at ~60× earnings the market leaves little room for error. <em>Great company; the question is the entry point.</em>";

document.getElementById("foot").innerHTML =
  "Source: " + D.source + " · all figures to be verified against the FY26 annual report.<br>" +
  "Reusable: edit the <b>DATA</b> object at the top of this file to run the dashboard on any company.";
</script>
<noscript><p style="font-family:monospace">This dashboard needs JavaScript to render its charts.</p></noscript>
</body>
</html>
